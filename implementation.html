<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실제 예방 자료 구현</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #04070d;
      color: #fff;
    }

    .back {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 100;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
    }

    .wrap {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 90px 0 40px;
    }

    .small {
      font-size: 0.95rem;
      color: #cfd8ff;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      background: #09111f;
      cursor: pointer;
      user-select: none;
    }

    .hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 12;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: min(60%, 560px);
    }

    .drug-btn {
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(5,12,22,0.76);
      color: #f2f6ff;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .drug-btn:hover {
      border-color: rgba(255,98,98,0.75);
      transform: translateY(-1px);
    }

    .drug-btn.active {
      background: rgba(255,54,54,0.24);
      border-color: rgba(255,102,102,0.95);
      box-shadow: 0 0 18px rgba(255,72,72,0.4);
    }

    .status {
      position: absolute;
      top: 88px;
      left: 18px;
      z-index: 12;
      background: rgba(4,10,18,0.72);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 0.92rem;
      color: #cbd9ff;
      backdrop-filter: blur(8px);
      max-width: min(60%, 540px);
      line-height: 1.5;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #09111f;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #09111f;
      transform: scale(1);
    }

    .zoom img {
      animation: zoomSlow 10s linear forwards;
    }

    @keyframes zoomSlow {
      from { transform: scale(1); }
      to { transform: scale(1.16); }
    }

    .pulse-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ff2d2d;
      box-shadow:
        0 0 0 0 rgba(255,45,45,0.75),
        0 0 18px 8px rgba(255,45,45,0.58);
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 5;
      pointer-events: none;
    }

    .pulse-dot.animating {
      animation: dotPulse 1s infinite;
    }

    @keyframes dotPulse {
      0% {
        box-shadow:
          0 0 0 0 rgba(255,45,45,0.6),
          0 0 18px 8px rgba(255,45,45,0.52);
      }
      70% {
        box-shadow:
          0 0 0 18px rgba(255,45,45,0),
          0 0 24px 10px rgba(255,45,45,0.36);
      }
      100% {
        box-shadow:
          0 0 0 0 rgba(255,45,45,0),
          0 0 18px 8px rgba(255,45,45,0.52);
      }
    }

    .brain-panel {
      position: absolute;
      right: 16px;
      top: 16px;
      width: min(29%, 340px);
      min-width: 220px;
      aspect-ratio: 4 / 3.2;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(6,14,28,0.72);
      backdrop-filter: blur(9px);
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .brain-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.95) brightness(0.8);
    }

    .brain-hotspot {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      background: rgba(255,85,85,0.2);
      border: 1px solid rgba(255,120,120,0.8);
      box-shadow:
        0 0 0 0 rgba(255,66,66,0),
        0 0 20px rgba(255,66,66,0.35);
      transform: translate(-50%, -50%) scale(0.92);
    }

    .brain-hotspot.flashing {
      animation: brainFlash 1.15s ease-in-out infinite;
    }

    @keyframes brainFlash {
      0%, 100% {
        opacity: 0.16;
        box-shadow:
          0 0 0 0 rgba(255,66,66,0),
          0 0 18px rgba(255,66,66,0.22);
        transform: translate(-50%, -50%) scale(0.9);
      }
      50% {
        opacity: 0.92;
        box-shadow:
          0 0 0 18px rgba(255,66,66,0),
          0 0 36px rgba(255,66,66,0.55);
        transform: translate(-50%, -50%) scale(1.03);
      }
    }

    .guide {
      margin-top: 18px;
      display: inline-block;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 700;
      color: #d7def5;
    }

    .path-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .path-overlay path {
      fill: none;
      stroke: transparent;
      stroke-width: 10;
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(1120px, calc(100% - 20px));
        padding-top: 78px;
      }

      .hud,
      .status {
        position: static;
        max-width: 100%;
        margin: 10px 0 0;
      }

      .stage {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
      }

      .slide {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
      }

      .brain-panel {
        position: relative;
        width: 100%;
        min-width: 0;
        top: auto;
        right: auto;
      }
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← 이전으로</a>

  <div class="wrap">
    <div class="small">실제 예방 자료 구현</div>
    <h1>약물의 체내 전달과 뇌 신경계 영향 시각화</h1>

    <div class="stage" id="stage">
      <div class="hud" id="drug-buttons"></div>
      <div class="status" id="status-text"></div>

      <div class="slide active" id="slide-vessel">
        <img src="vessel_map.png" alt="인체 혈관 및 장기 지도" />
        <svg class="path-overlay" id="path-overlay" viewBox="0 0 1600 900" preserveAspectRatio="none">
          <!--
            팔꿈치 부근(왼쪽 팔) → 상완 → 어깨 → 목 → 뇌 방향으로 조정한 경로
            실제 이미지 비율 기준 상대좌표라서 기존보다 훨씬 자연스럽게 이동합니다.
          -->
          <path id="blood-path"
            d="M 635 525
             C 650 500, 670 455, 690 410
             C 710 365, 735 320, 760 280
             C 785 240, 805 195, 820 150
             C 828 125, 832 105, 835 88" />
        </svg>
        <div class="pulse-dot" id="pulse-dot"></div>
      </div>

      <div class="brain-panel">
        <img src="brain.jpg" alt="약물 영향 뇌 영역" />
        <div class="brain-hotspot" id="prefrontal"></div>
        <div class="brain-hotspot" id="nucleus"></div>
        <div class="brain-hotspot" id="hippocampus"></div>
        <div class="brain-hotspot" id="amygdala"></div>
        <div class="brain-hotspot" id="brainstem"></div>
      </div>
    </div>

    <div class="guide" id="guide">마약 종류를 고른 뒤 화면을 클릭하면 팔꿈치 혈관 → 뇌 도달 애니메이션이 시작됩니다.</div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const slideVessel = document.getElementById("slide-vessel");
    const pulseDot = document.getElementById("pulse-dot");
    const bloodPath = document.getElementById("blood-path");
    const statusText = document.getElementById("status-text");
    const drugButtons = document.getElementById("drug-buttons");
    const hotspots = {
      prefrontal: document.getElementById("prefrontal"),
      nucleus: document.getElementById("nucleus"),
      hippocampus: document.getElementById("hippocampus"),
      amygdala: document.getElementById("amygdala"),
      brainstem: document.getElementById("brainstem")
    };

    let timers = [];
    let frameId = null;
    let running = false;
    let selectedDrug = "meth";

    const DUR_VESSEL = 8200;
    const HOTSPOT_FLASH_DUR = 6500;
    const DRUGS = {
      meth: {
        label: "메스암페타민",
        color: "rgba(255, 88, 88, 0.95)",
        targets: ["nucleus", "prefrontal"],
        message: "보상회로(측좌핵)와 전전두엽을 강하게 과자극해 충동 조절과 판단 기능을 무너뜨립니다."
      },
      cocaine: {
        label: "코카인",
        color: "rgba(255, 138, 82, 0.95)",
        targets: ["nucleus", "amygdala"],
        message: "도파민 재흡수 억제로 보상회로와 편도체의 흥분이 커져 불안·집착이 강화될 수 있습니다."
      },
      heroin: {
        label: "헤로인(오피오이드)",
        color: "rgba(255, 116, 162, 0.95)",
        targets: ["brainstem", "nucleus"],
        message: "뇌간 호흡중추와 보상회로에 작용해 호흡 억제·의존 위험을 급격히 높입니다."
      },
      cannabis: {
        label: "대마",
        color: "rgba(151, 255, 137, 0.95)",
        targets: ["hippocampus", "prefrontal"],
        message: "해마·전전두엽 CB1 수용체에 작용해 기억 고정과 집중력, 실행기능에 영향을 줍니다."
      },
      nicotine: {
        label: "니코틴",
        color: "rgba(129, 184, 255, 0.95)",
        targets: ["nucleus", "prefrontal", "amygdala"],
        message: "니코틴성 수용체를 통해 보상회로·주의회로·정서회로가 동시에 강화돼 빠른 중독이 생깁니다."
      }
    };
    const HOTSPOT_LAYOUT = {
      prefrontal: { x: 72, y: 38, w: 68, h: 52 },
      nucleus: { x: 57, y: 56, w: 56, h: 48 },
      hippocampus: { x: 43, y: 54, w: 54, h: 42 },
      amygdala: { x: 47, y: 65, w: 42, h: 34 },
      brainstem: { x: 33, y: 71, w: 46, h: 54 }
    };

    function clearAll() {
      timers.forEach(clearTimeout);
      timers = [];
      if (frameId) cancelAnimationFrame(frameId);
      frameId = null;
      running = false;
    }

    function resetSlides() {
      slideVessel.classList.add("active");
      pulseDot.style.opacity = "0";
      pulseDot.classList.remove("animating");
      clearHotspots();
      applyHotspotBaseLayout();
    }

    function getPathPoint(progress) {
      const totalLength = bloodPath.getTotalLength();
      return bloodPath.getPointAtLength(totalLength * progress);
    }

    function positionDotAt(progress) {
      const point = getPathPoint(progress);
      const stageRect = stage.getBoundingClientRect();

      const x = point.x / 1600 * stageRect.width;
      const y = point.y / 900 * stageRect.height;

      pulseDot.style.left = `${x}px`;
      pulseDot.style.top = `${y}px`;
    }

    function applyHotspotBaseLayout() {
      Object.entries(HOTSPOT_LAYOUT).forEach(([key, cfg]) => {
        const spot = hotspots[key];
        spot.style.left = `${cfg.x}%`;
        spot.style.top = `${cfg.y}%`;
        spot.style.width = `${cfg.w}px`;
        spot.style.height = `${cfg.h}px`;
      });
    }

    function clearHotspots() {
      Object.values(hotspots).forEach(spot => {
        spot.classList.remove("flashing");
        spot.style.background = "rgba(255,85,85,0.2)";
        spot.style.borderColor = "rgba(255,120,120,0.8)";
      });
    }

    function activateDrugHotspots(drugKey) {
      clearHotspots();
      const info = DRUGS[drugKey];
      info.targets.forEach(target => {
        const spot = hotspots[target];
        spot.style.background = info.color.replace("0.95", "0.25");
        spot.style.borderColor = info.color;
        spot.classList.add("flashing");
      });
    }

    function updateStatusText(text) {
      statusText.textContent = text;
    }

    function renderDrugButtons() {
      Object.entries(DRUGS).forEach(([key, info]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "drug-btn";
        button.dataset.drug = key;
        button.textContent = info.label;

        button.addEventListener("click", (event) => {
          event.stopPropagation();
          selectedDrug = key;
          syncButtonState();
          updateStatusText(`선택 약물: ${info.label} · ${info.message}`);
          if (!running) {
            resetSlides();
          }
        });

        drugButtons.appendChild(button);
      });
    }

    function syncButtonState() {
      [...drugButtons.querySelectorAll(".drug-btn")].forEach(btn => {
        btn.classList.toggle("active", btn.dataset.drug === selectedDrug);
      });
    }

    function animateBloodFlow(duration = DUR_VESSEL) {
      const start = performance.now();
      pulseDot.style.opacity = "1";
      pulseDot.classList.add("animating");

      function frame(now) {
        const elapsed = now - start;
        const t = Math.min(elapsed / duration, 1);
        positionDotAt(t);

        if (t < 1) {
          frameId = requestAnimationFrame(frame);
        }
      }

      frameId = requestAnimationFrame(frame);
    }

    function startSequence() {
      clearAll();
      resetSlides();
      running = true;
      const info = DRUGS[selectedDrug];

      positionDotAt(0);
      animateBloodFlow(DUR_VESSEL);
      updateStatusText(`혈관 이동 중... ${info.label} 성분이 팔꿈치 혈관에서 뇌로 향합니다.`);

      timers.push(setTimeout(() => {
        pulseDot.style.opacity = "0";
        pulseDot.classList.remove("animating");
        activateDrugHotspots(selectedDrug);
        updateStatusText(`뇌 도달! ${info.message}`);
      }, DUR_VESSEL));

      timers.push(setTimeout(() => {
        clearHotspots();
        updateStatusText(`재생 완료. 다른 약물을 눌러 비교해 보세요.`);
        running = false;
      }, DUR_VESSEL + HOTSPOT_FLASH_DUR));
    }

    stage.addEventListener("click", () => {
      startSequence();
    });

    window.addEventListener("resize", () => {
      applyHotspotBaseLayout();
      if (!running) positionDotAt(0);
    });

    renderDrugButtons();
    syncButtonState();
    applyHotspotBaseLayout();
    updateStatusText(`선택 약물: ${DRUGS[selectedDrug].label} · ${DRUGS[selectedDrug].message}`);

    // 첫 진입 시 1회 자동 재생
    startSequence();
  </script>
</body>
</html>
