<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실제 예방 자료 구현</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #04070d;
      color: #fff;
    }

    .back {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 100;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
    }

    .wrap {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 90px 0 40px;
    }

    .small {
      font-size: 0.95rem;
      color: #cfd8ff;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      background: #09111f;
      cursor: pointer;
      user-select: none;
    }

    .hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 12;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: min(52%, 560px);
    }

    .drug-btn {
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(5,12,22,0.76);
      color: #f2f6ff;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .drug-btn:hover {
      border-color: rgba(255,98,98,0.75);
      transform: translateY(-1px);
    }

    .drug-btn.active {
      background: rgba(255,54,54,0.24);
      border-color: rgba(255,102,102,0.95);
      box-shadow: 0 0 18px rgba(255,72,72,0.4);
    }

    .status {
      position: absolute;
      top: 88px;
      left: 18px;
      z-index: 12;
      background: rgba(4,10,18,0.72);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 0.92rem;
      color: #cbd9ff;
      backdrop-filter: blur(8px);
      max-width: min(60%, 540px);
      line-height: 1.5;
    }

    .body-area {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 2;
      pointer-events: none;
    }

    .body-figure {
      height: 88%;
      max-height: 850px;
      width: auto;
      filter: saturate(1.05) drop-shadow(0 14px 26px rgba(0,0,0,0.3));
    }

    .pulse-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ff2d2d;
      box-shadow:
        0 0 0 0 rgba(255,45,45,0.75),
        0 0 18px 8px rgba(255,45,45,0.58);
      transform: translate(-50%, -50%);
      opacity: 0;
      z-index: 5;
      pointer-events: none;
    }

    .pulse-dot.animating {
      animation: dotPulse 1s infinite;
    }

    @keyframes dotPulse {
      0% {
        box-shadow:
          0 0 0 0 rgba(255,45,45,0.6),
          0 0 18px 8px rgba(255,45,45,0.52);
      }
      70% {
        box-shadow:
          0 0 0 18px rgba(255,45,45,0),
          0 0 24px 10px rgba(255,45,45,0.36);
      }
      100% {
        box-shadow:
          0 0 0 0 rgba(255,45,45,0),
          0 0 18px 8px rgba(255,45,45,0.52);
      }
    }

    .region-panel {
      position: absolute;
      right: 16px;
      top: 16px;
      width: min(34%, 380px);
      min-width: 250px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(6,14,28,0.76);
      backdrop-filter: blur(9px);
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      padding: 12px;
    }

    .region-title {
      margin: 2px 4px 10px;
      font-size: 0.92rem;
      color: #dbe6ff;
      font-weight: 700;
    }

    .region-display {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.35);
    }

    .region-display img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      filter: brightness(0.92);
    }

    .region-caption {
      padding: 12px 12px 14px;
      line-height: 1.6;
      font-size: 0.92rem;
      color: #e7edff;
    }

    .region-display.flash {
      animation: singleFlash 0.9s ease-in-out infinite;
      border-color: rgba(255,90,90,1);
    }

    @keyframes singleFlash {
      0%, 100% {
        box-shadow:
          0 0 0 rgba(255,60,60,0),
          0 0 0 rgba(255,120,120,0);
        filter: saturate(1) brightness(1);
        transform: scale(1);
      }
      50% {
        box-shadow:
          0 0 30px rgba(255,60,60,0.95),
          0 0 70px rgba(255,90,90,0.75),
          0 0 110px rgba(255,120,120,0.45);
        filter: saturate(1.9) brightness(1.18);
        transform: scale(1.035);
      }
    }

    .guide {
      margin-top: 18px;
      display: inline-block;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      font-weight: 700;
      color: #d7def5;
    }

    .path-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .path-overlay path {
      fill: none;
      stroke: transparent;
      stroke-width: 10;
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(1120px, calc(100% - 20px));
        padding-top: 78px;
      }

      .hud,
      .status {
        position: static;
        max-width: 100%;
        margin: 10px 0 0;
      }

      .stage {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        aspect-ratio: auto;
      }

      .body-area {
        position: relative;
        min-height: 62vh;
      }

      .body-figure {
        height: auto;
        width: min(72%, 320px);
      }

      .region-panel {
        position: relative;
        width: 100%;
        min-width: 0;
        top: auto;
        right: auto;
      }
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← 이전으로</a>

  <div class="wrap">
    <div class="small">실제 예방 자료 구현</div>
    <h1>약물의 체내 전달과 뇌 신경계 영향 시각화</h1>

    <div class="stage" id="stage">
      <div class="hud" id="drug-buttons"></div>
      <div class="status" id="status-text"></div>

      <div class="body-area">
        <img class="body-figure" src="vascular_body.png" alt="인체 혈관 지도" />
        <svg class="path-overlay" id="path-overlay" viewBox="0 0 1600 900" preserveAspectRatio="none">
          <path d="M 920 550 
                   C 950 500, 940 400, 915 380 
                   S 900 250, 910 200" 
                fill="none" 
                stroke="red" 
                stroke-width="3" 
                id="drug-path" />
        </svg>
        <div class="pulse-dot" id="pulse-dot"></div>
      </div>

      <div class="region-panel">
        <div class="region-title">선택된 약물의 대표 뇌 작용 부위</div>
        <div class="region-display" id="region-display">
          <img id="region-image" src="NA.png" alt="대표 뇌 작용 부위 이미지" />
        </div>
        <div class="region-caption" id="region-caption">
          메스암페타민은 보상회로와 전전두엽 기능에 강하게 영향을 줄 수 있습니다.
        </div>
      </div>
    </div>

    <div class="guide" id="guide">마약 종류를 고른 뒤 화면을 클릭하면 팔꿈치 혈관 → 뇌 도달 애니메이션이 시작됩니다.</div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const pulseDot = document.getElementById("pulse-dot");
    const bloodPath = document.getElementById("blood-path");
    const statusText = document.getElementById("status-text");
    const drugButtons = document.getElementById("drug-buttons");

    const regionDisplay = document.getElementById("region-display");
    const regionImage = document.getElementById("region-image");
    const regionCaption = document.getElementById("region-caption");

    let timers = [];
    let frameId = null;
    let running = false;
    let selectedDrug = "meth";

    const DUR_VESSEL = 8200;
    const REGION_FLASH_DUR = 6500;

    const DRUGS = {
      meth: {
        label: "메스암페타민",
        color: "rgba(255, 88, 88, 0.95)",
        image: "NA.png",
        caption: "대표적으로 보상회로(측좌핵, NA)와 전전두엽 기능에 강한 영향을 줄 수 있습니다.",
        message: "보상회로와 전전두엽을 강하게 과자극해 충동 조절과 판단 기능을 무너뜨립니다."
      },
      cocaine: {
        label: "코카인",
        color: "rgba(255, 138, 82, 0.95)",
        image: "amygdala_nucleus.png",
        caption: "대표적으로 편도체와 보상회로의 흥분이 커질 수 있습니다.",
        message: "도파민 재흡수 억제로 보상회로와 편도체의 흥분이 커져 불안과 집착이 강화될 수 있습니다."
      },
      heroin: {
        label: "헤로인(오피오이드)",
        color: "rgba(255, 116, 162, 0.95)",
        image: "brainstem.png",
        caption: "대표적으로 뇌간 호흡중추 관련 위험이 강조됩니다.",
        message: "뇌간 호흡중추와 보상회로에 작용해 호흡 억제와 의존 위험을 급격히 높입니다."
      },
      cannabis: {
        label: "대마",
        color: "rgba(151, 255, 137, 0.95)",
        image: "hippocampus.png",
        caption: "대표적으로 해마 기능과 기억 고정 과정에 영향을 줄 수 있습니다.",
        message: "해마 중심 회로에 영향을 주어 기억, 정서 반응, 실행기능 변화가 나타날 수 있습니다."
      },
      nicotine: {
        label: "니코틴",
        color: "rgba(129, 184, 255, 0.95)",
        image: "prefrontal_region.png",
        caption: "대표적으로 전전두엽과 주의·조절 회로에 영향을 줄 수 있습니다.",
        message: "니코틴성 수용체를 통해 보상회로와 주의회로가 강화돼 빠른 중독이 생길 수 있습니다."
      }
    };

    function clearAll() {
      timers.forEach(clearTimeout);
      timers = [];
      if (frameId) cancelAnimationFrame(frameId);
      frameId = null;
      running = false;
    }

    function clearRegionFlash() {
      regionDisplay.classList.remove("flash");
      regionDisplay.style.borderColor = "rgba(255,255,255,0.18)";
    }

    function resetSlides() {
      pulseDot.style.opacity = "0";
      pulseDot.classList.remove("animating");
      clearRegionFlash();
    }

    function getPathPoint(progress) {
      const totalLength = bloodPath.getTotalLength();
      return bloodPath.getPointAtLength(totalLength * progress);
    }

    function positionDotAt(progress) {
      const point = getPathPoint(progress);
      const stageRect = stage.getBoundingClientRect();

      const x = point.x / 1600 * stageRect.width;
      const y = point.y / 900 * stageRect.height;

      pulseDot.style.left = `${x}px`;
      pulseDot.style.top = `${y}px`;
    }

    function renderDrugImage(drugKey) {
      const info = DRUGS[drugKey];
      regionImage.src = info.image;
      regionImage.alt = `${info.label} 대표 뇌 작용 부위`;
      regionCaption.textContent = info.caption;
      regionDisplay.style.borderColor = info.color;
    }

    function flashDrugImage(drugKey) {
      const info = DRUGS[drugKey];
      renderDrugImage(drugKey);
      regionDisplay.style.borderColor = info.color;
      regionDisplay.classList.add("flash");
    }

    function updateStatusText(text) {
      statusText.textContent = text;
    }

    function renderDrugButtons() {
      Object.entries(DRUGS).forEach(([key, info]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "drug-btn";
        button.dataset.drug = key;
        button.textContent = info.label;

        button.addEventListener("click", (event) => {
          event.stopPropagation();
          selectedDrug = key;
          syncButtonState();
          renderDrugImage(selectedDrug);
          updateStatusText(`선택 약물: ${info.label} · ${info.message}`);
          if (!running) {
            resetSlides();
          }
        });

        drugButtons.appendChild(button);
      });
    }

    function syncButtonState() {
      [...drugButtons.querySelectorAll(".drug-btn")].forEach(btn => {
        btn.classList.toggle("active", btn.dataset.drug === selectedDrug);
      });
    }

    function animateBloodFlow(duration = DUR_VESSEL) {
      const start = performance.now();
      pulseDot.style.opacity = "1";
      pulseDot.classList.add("animating");

      function frame(now) {
        const elapsed = now - start;
        const t = Math.min(elapsed / duration, 1);
        positionDotAt(t);

        if (t < 1) {
          frameId = requestAnimationFrame(frame);
        }
      }

      frameId = requestAnimationFrame(frame);
    }

    function startSequence() {
      clearAll();
      resetSlides();
      running = true;

      const info = DRUGS[selectedDrug];

      positionDotAt(0);
      animateBloodFlow(DUR_VESSEL);
      updateStatusText(`혈관 이동 중... ${info.label} 성분이 팔꿈치 혈관에서 뇌로 향합니다.`);

      timers.push(setTimeout(() => {
        pulseDot.style.opacity = "0";
        pulseDot.classList.remove("animating");
        flashDrugImage(selectedDrug);
        updateStatusText(`뇌 도달! ${info.message}`);
      }, DUR_VESSEL));

      timers.push(setTimeout(() => {
        clearRegionFlash();
        updateStatusText(`재생 완료. 다른 약물을 눌러 비교해 보세요.`);
        running = false;
      }, DUR_VESSEL + REGION_FLASH_DUR));
    }

    stage.addEventListener("click", () => {
      startSequence();
    });

    window.addEventListener("resize", () => {
      if (!running) positionDotAt(0);
    });

    renderDrugButtons();
    syncButtonState();
    renderDrugImage(selectedDrug);
    updateStatusText(`선택 약물: ${DRUGS[selectedDrug].label} · ${DRUGS[selectedDrug].message}`);

    startSequence();
  </script>
</body>
</html>
