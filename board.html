<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>익명게시판</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#fff;
}

.wrap {
  width:900px;
  margin:60px auto;
}

h1 {
  margin-bottom:20px;
}

.write {
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button {
  padding:8px 12px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border-bottom:1px solid #ddd;
  padding:8px;
  text-align:left;
}

.title {
  cursor:pointer;
  color:blue;
}

.title:hover {
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="wrap">
<h1>익명게시판</h1>

<div class="write">
<input id="title" placeholder="제목">
<textarea id="content" placeholder="내용"></textarea>
<button onclick="writePost()">작성</button>
</div>

<table>
<thead>
<tr>
<th>번호</th>
<th>제목</th>
<th>시간</th>
<th>추천</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSy...",
 authDomain: "socialmissionproject.firebaseapp.com",
 projectId: "socialmissionproject",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

window.writePost = async () => {
 const title = document.getElementById("title").value;
 const content = document.getElementById("content").value;

 await addDoc(collection(db,"posts"),{
  title, content,
  createdAt: Date.now(),
  likes:0,
  dislikes:0
 });
};

const q = query(collection(db,"posts"), orderBy("createdAt","desc"));

onSnapshot(q,(snap)=>{
 list.innerHTML="";
 let i=1;
 snap.forEach(doc=>{
  const data = doc.data();

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${i++}</td>
    <td class="title" onclick="go('${doc.id}')">${data.title}</td>
    <td>${new Date(data.createdAt).toLocaleString()}</td>
    <td>${data.likes||0}</td>
  `;

  list.appendChild(tr);
 });
});

window.go = (id)=>{
 location.href = "post.html?id="+id;
};
</script>

</body>
</html>
