<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>익명게시판</title>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #0b1220;
      color: #f4f7ff;
    }

    .back {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 100;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
    }

    .hero {
      position: sticky;
      top: 0;
      height: 52vh;
      min-height: 320px;
      overflow: hidden;
      color: #fff;
      background: linear-gradient(180deg, #0f274c 0%, #09172d 100%);
    }

    .fill {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #173564 0%, #09172d 100%);
      transform: translateY(0%);
      will-change: transform;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      padding: 88px 40px 30px;
    }

    .small {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 22px;
      letter-spacing: -0.03em;
      color: #c8d8ff;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1.03;
      letter-spacing: -0.05em;
    }

    .content {
      position: relative;
      z-index: 2;
      background: #0b1220;
      padding: 40px 0 90px;
    }

    .wrap {
      width: min(1100px, calc(100% - 40px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.22);
      backdrop-filter: blur(10px);
    }

    .write-panel {
      padding: 22px;
      position: sticky;
      top: 24px;
    }

    .write-panel h2,
    .list-panel h2 {
      margin: 0 0 16px;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }

    .help {
      margin: 0 0 18px;
      color: #b8c5e5;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      font-weight: 700;
      color: #dfe8ff;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      color: #fff;
      border-radius: 16px;
      padding: 14px 14px;
      font: inherit;
      outline: none;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: #8fa2c8;
    }

    textarea {
      resize: vertical;
      min-height: 180px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, #7bb6ff, #4c8cff);
      color: #081526;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(76,140,255,0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
    }

    .list-panel {
      padding: 22px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .search {
      flex: 1 1 280px;
      min-width: 200px;
    }

    .empty {
      padding: 28px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      color: #b8c5e5;
      line-height: 1.8;
      border: 1px dashed rgba(255,255,255,0.12);
    }

    .post-list {
      display: grid;
      gap: 14px;
    }

    .post {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 18px 18px 16px;
    }

    .post-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: start;
      margin-bottom: 10px;
    }

    .post-title {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.4;
      letter-spacing: -0.02em;
      color: #f7fbff;
    }

    .post-meta {
      font-size: 0.84rem;
      color: #91a5cb;
      white-space: nowrap;
    }

    .post-body {
      margin: 0 0 14px;
      color: #dce6fb;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #f4f7ff;
      border-radius: 999px;
      padding: 8px 12px;
      font: inherit;
      font-size: 0.86rem;
      cursor: pointer;
    }

    .mini-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .danger:hover {
      background: rgba(255,80,80,0.14);
      border-color: rgba(255,120,120,0.25);
    }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .write-panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .hero-inner {
        padding: 88px 22px 24px;
      }

      .wrap {
        width: min(1100px, calc(100% - 20px));
      }

      .write-panel,
      .list-panel {
        padding: 18px 16px;
      }

      .post-head {
        flex-direction: column;
      }

      .post-meta {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← 이전으로</a>

  <section class="hero" id="hero">
    <div class="fill" id="fill"></div>
    <div class="hero-inner">
      <div class="small">익명게시판</div>
      <h1>자유롭게 의견을 남길 수 있는 익명 공간</h1>
    </div>
  </section>

  <section class="content">
    <div class="wrap">
      <aside class="panel write-panel">
        <h2>글 작성</h2>
        <p class="help">
          이름 없이 글을 남길 수 있습니다.  
          이 버전은 GitHub Pages에서 동작하도록 브라우저 저장 방식으로 구성됩니다.
        </p>

        <div class="field">
          <label for="title">제목</label>
          <input id="title" type="text" placeholder="제목을 입력하세요" maxlength="80" />
        </div>

        <div class="field">
          <label for="content">내용</label>
          <textarea id="content" placeholder="내용을 입력하세요"></textarea>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="submitBtn" type="button">등록하기</button>
          <button class="btn btn-secondary" id="clearBtn" type="button">입력 지우기</button>
        </div>
      </aside>

      <main class="panel list-panel">
        <h2>게시글 목록</h2>

        <div class="toolbar">
          <input class="search" id="searchInput" type="text" placeholder="제목 또는 내용 검색" />
          <button class="btn btn-secondary" id="deleteAllBtn" type="button">전체 삭제</button>
        </div>

        <div id="emptyState" class="empty">
          아직 작성된 글이 없습니다. 첫 번째 글을 남겨보세요.
        </div>

        <div id="postList" class="post-list"></div>
      </main>
    </div>
  </section>

  <script>
    const hero = document.getElementById('hero');
    const fill = document.getElementById('fill');

    function updateFill() {
      const rect = hero.getBoundingClientRect();
      const h = hero.offsetHeight || 1;
      const progress = Math.min(Math.max(-rect.top / h, 0), 1);
      fill.style.transform = `translateY(${-progress * 100}%)`;
    }

    window.addEventListener('scroll', updateFill, { passive: true });
    window.addEventListener('resize', updateFill);
    updateFill();

    const STORAGE_KEY = 'anonymous_board_posts_v1';

    const titleInput = document.getElementById('title');
    const contentInput = document.getElementById('content');
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const deleteAllBtn = document.getElementById('deleteAllBtn');
    const searchInput = document.getElementById('searchInput');
    const postList = document.getElementById('postList');
    const emptyState = document.getElementById('emptyState');

    function loadPosts() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function savePosts(posts) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }

    function formatDate(timestamp) {
      const d = new Date(timestamp);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${y}-${m}-${day} ${h}:${min}`;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderPosts() {
      const query = searchInput.value.trim().toLowerCase();
      const posts = loadPosts();

      const filtered = posts.filter(post => {
        return (
          post.title.toLowerCase().includes(query) ||
          post.content.toLowerCase().includes(query)
        );
      });

      postList.innerHTML = '';

      if (filtered.length === 0) {
        emptyState.style.display = 'block';
        emptyState.textContent = query
          ? '검색 결과가 없습니다.'
          : '아직 작성된 글이 없습니다. 첫 번째 글을 남겨보세요.';
        return;
      }

      emptyState.style.display = 'none';

      filtered.forEach(post => {
        const article = document.createElement('article');
        article.className = 'post';

        article.innerHTML = `
          <div class="post-head">
            <h3 class="post-title">${escapeHtml(post.title)}</h3>
            <div class="post-meta">익명 · ${formatDate(post.createdAt)}</div>
          </div>
          <p class="post-body">${escapeHtml(post.content)}</p>
          <div class="post-actions">
            <button class="mini-btn danger" type="button" data-id="${post.id}">삭제</button>
          </div>
        `;

        const deleteBtn = article.querySelector('[data-id]');
        deleteBtn.addEventListener('click', () => {
          const posts = loadPosts().filter(item => item.id !== post.id);
          savePosts(posts);
          renderPosts();
        });

        postList.appendChild(article);
      });
    }

    function createPost() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title) {
        alert('제목을 입력해주세요.');
        titleInput.focus();
        return;
      }

      if (!content) {
        alert('내용을 입력해주세요.');
        contentInput.focus();
        return;
      }

      const posts = loadPosts();
      posts.unshift({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        title,
        content,
        createdAt: Date.now()
      });

      savePosts(posts);
      titleInput.value = '';
      contentInput.value = '';
      renderPosts();
    }

    submitBtn.addEventListener('click', createPost);

    clearBtn.addEventListener('click', () => {
      titleInput.value = '';
      contentInput.value = '';
    });

    deleteAllBtn.addEventListener('click', () => {
      const ok = confirm('모든 게시글을 삭제하시겠습니까?');
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      renderPosts();
    });

    searchInput.addEventListener('input', renderPosts);

    renderPosts();
  </script>
</body>
</html>
