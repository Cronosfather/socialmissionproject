<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>익명게시판</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:#fff;
}

.back {
  position:fixed;
  top:15px;
  left:15px;
  padding:10px 16px;
  border-radius:999px;
  background:#0008;
  color:#fff;
  text-decoration:none;
}

.wrap {
  width:900px;
  margin:80px auto;
}

.box {
  background:#1b2438;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
  background:#111;
  color:#fff;
}

button {
  padding:10px 14px;
  border-radius:999px;
  border:none;
  background:#4c8cff;
  color:#fff;
}

.post {
  background:#1b2438;
  padding:16px;
  border-radius:16px;
  margin-bottom:10px;
}

.title {
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<a class="back" href="index.html">← 이전으로</a>

<div class="wrap">

<div class="box">
<input id="title" placeholder="제목">
<textarea id="content" placeholder="내용"></textarea>
<button onclick="writePost()">작성</button>
</div>

<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSy...",
 authDomain: "socialmissionproject.firebaseapp.com",
 projectId: "socialmissionproject",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.writePost = async()=>{
 const title = document.getElementById("title").value;
 const content = document.getElementById("content").value;

 await addDoc(collection(db,"posts"),{
  title, content,
  createdAt: Date.now(),
  likes:0,
  dislikes:0
 });
};

const list = document.getElementById("list");

onSnapshot(query(collection(db,"posts"),orderBy("createdAt","desc")),snap=>{
 list.innerHTML="";
 snap.forEach(doc=>{
  const d = doc.data();

  const div = document.createElement("div");
  div.className="post";

  div.innerHTML=`
    <div class="title" onclick="go('${doc.id}')">${d.title}</div>
    <div>${new Date(d.createdAt).toLocaleString()}</div>
  `;

  list.appendChild(div);
 });
});

window.go=(id)=>{
 location.href="post.html?id="+id;
};
</script>

</body>
</html>
