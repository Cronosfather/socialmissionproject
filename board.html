<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>익명게시판</title>

  <style>
    body {
      margin: 0;
      font-family: "Pretendard", sans-serif;
      background: #0b1220;
      color: #fff;
    }

    .wrap {
      width: min(1000px, 90%);
      margin: 80px auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1b2438;
      color: #fff;
    }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: #4c8cff;
      color: #fff;
      cursor: pointer;
    }

    .post {
      background: #1b2438;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
    }

    .delete {
      margin-top: 10px;
      background: #ff4d4d;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>익명게시판</h1>

    <input id="title" placeholder="제목" />
    <textarea id="content" placeholder="내용"></textarea>
    <button id="submitBtn">작성</button>

    <div id="postList"></div>
  </div>

  <!-- 🔥 Firebase 시작 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwjpn1zXbY3rtNSH6clOgNZ3eYRwjqsqY",
      authDomain: "socialmissionproject.firebaseapp.com",
      projectId: "socialmissionproject",
      storageBucket: "socialmissionproject.firebasestorage.app",
      messagingSenderId: "347247388589",
      appId: "1:347247388589:web:781261d448feb5afbce324",
      measurementId: "G-DX93ZMJB15"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const titleInput = document.getElementById("title");
    const contentInput = document.getElementById("content");
    const submitBtn = document.getElementById("submitBtn");
    const postList = document.getElementById("postList");

    // 글 작성
    async function createPost() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title || !content) {
        alert("입력하세요");
        return;
      }

      await addDoc(collection(db, "posts"), {
        title,
        content,
        createdAt: Date.now()
      });

      titleInput.value = "";
      contentInput.value = "";
    }

    submitBtn.onclick = createPost;

    // 실시간 게시글 불러오기
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
      postList.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const post = docSnap.data();
        const id = docSnap.id;

        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
          <h3>${post.title}</h3>
          <p>${post.content}</p>
          <div class="meta">${new Date(post.createdAt).toLocaleString()}</div>
          <button class="delete">삭제</button>
        `;

        div.querySelector(".delete").onclick = async () => {
          await deleteDoc(doc(db, "posts", id));
        };

        postList.appendChild(div);
      });
    });
  </script>
</body>
</html>
