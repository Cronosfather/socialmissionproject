<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>익명게시판</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #0b1220;
      color: #fff;
    }

    /* 🔥 이전 버튼 */
    .back {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 100;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
    }

    .wrap {
      width: min(1000px, 90%);
      margin: 100px auto 60px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 12px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #1b2438;
      color: #fff;
      font-size: 1rem;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    button {
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(180deg, #7bb6ff, #4c8cff);
      color: #081526;
      font-weight: 700;
      cursor: pointer;
      margin-right: 8px;
    }

    .post {
      background: #1b2438;
      padding: 18px;
      border-radius: 16px;
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .meta {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 6px;
    }

    .delete {
      margin-top: 10px;
      background: #ff4d4d;
      color: #fff;
    }
  </style>
</head>

<body>

  <!-- 🔥 이전 버튼 -->
  <a class="back" href="index.html">← 이전으로</a>

  <div class="wrap">
    <h1>익명게시판</h1>

    <input id="title" placeholder="제목 입력" />
    <textarea id="content" placeholder="내용 입력"></textarea>
    <button id="submitBtn">작성</button>

    <div id="postList"></div>
  </div>

  <!-- 🔥 Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwjpn1zXbY3rtNSH6clOgNZ3eYRwjqsqY",
      authDomain: "socialmissionproject.firebaseapp.com",
      projectId: "socialmissionproject",
      storageBucket: "socialmissionproject.firebasestorage.app",
      messagingSenderId: "347247388589",
      appId: "1:347247388589:web:781261d448feb5afbce324",
      measurementId: "G-DX93ZMJB15"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const titleInput = document.getElementById("title");
    const contentInput = document.getElementById("content");
    const submitBtn = document.getElementById("submitBtn");
    const postList = document.getElementById("postList");

    // 글 작성
    async function createPost() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title || !content) {
        alert("내용을 입력하세요");
        return;
      }

      await addDoc(collection(db, "posts"), {
        title,
        content,
        createdAt: Date.now()
      });

      titleInput.value = "";
      contentInput.value = "";
    }

    submitBtn.onclick = createPost;

    // 실시간 데이터
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
      postList.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const post = docSnap.data();
        const id = docSnap.id;

        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
          <strong>${post.title}</strong>
          <p>${post.content}</p>
          <div class="meta">${new Date(post.createdAt).toLocaleString()}</div>
          <button class="delete">삭제</button>
        `;

        div.querySelector(".delete").onclick = async () => {
          await deleteDoc(doc(db, "posts", id));
        };

        postList.appendChild(div);
      });
    });
  </script>

</body>
</html>
