<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>게시글</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:#fff;
}

.back {
  position:fixed;
  top:15px;
  left:15px;
  padding:10px 16px;
  border-radius:999px;
  background:#0008;
  color:#fff;
  text-decoration:none;
}

.wrap {
  width:800px;
  margin:80px auto;
}

.box {
  background:#1b2438;
  padding:20px;
  border-radius:20px;
}

.big-btn {
  font-size:24px;
  cursor:pointer;
  margin-right:10px;
}

.star.active {
  color:gold;
}

.comment {
  margin-top:10px;
  padding:10px;
  border-top:1px solid #555;
}
</style>
</head>

<body>

<a class="back" href="board.html">← 이전으로</a>

<div class="wrap">

<div class="box">
<h2 id="title"></h2>
<p id="content"></p>

<div>
<span class="big-btn star" id="like">★</span>
<span id="likeCount"></span>

<span class="big-btn" id="dislike">↓</span>
<span id="dislikeCount"></span>
</div>
</div>

<div class="box">
<h3>댓글</h3>

<textarea id="commentInput"></textarea>
<button onclick="addComment()">등록</button>

<div id="comments"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
 getFirestore, doc, getDoc,
 updateDoc, increment,
 collection, addDoc,
 onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSy...",
 authDomain: "socialmissionproject.firebaseapp.com",
 projectId: "socialmissionproject",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");
const postRef = doc(db,"posts",id);

const snap = await getDoc(postRef);
const data = snap.data();

document.getElementById("title").innerText=data.title;
document.getElementById("content").innerText=data.content;

const likeBtn=document.getElementById("like");
const dislikeBtn=document.getElementById("dislike");

const likeCount=document.getElementById("likeCount");
const dislikeCount=document.getElementById("dislikeCount");

likeCount.innerText=data.likes||0;
dislikeCount.innerText=data.dislikes||0;

/* 즉시 반응 */
likeBtn.onclick=async()=>{
 likeCount.innerText=parseInt(likeCount.innerText)+1;
 likeBtn.classList.add("active");
 await updateDoc(postRef,{likes:increment(1)});
};

dislikeBtn.onclick=async()=>{
 dislikeCount.innerText=parseInt(dislikeCount.innerText)+1;
 await updateDoc(postRef,{dislikes:increment(1)});
};

/* 댓글 */
const commentRef=collection(db,"posts",id,"comments");

window.addComment=async()=>{
 const text=document.getElementById("commentInput").value;
 await addDoc(commentRef,{
  content:text,
  createdAt:Date.now(),
  likes:0
 });
};

/* 댓글 표시 + 좋아요 */
onSnapshot(commentRef,snap=>{
 const box=document.getElementById("comments");
 box.innerHTML="";

 snap.forEach(doc=>{
  const d=doc.data();

  const div=document.createElement("div");
  div.className="comment";

  const likeId="c_like_"+doc.id;

  div.innerHTML=`
    ${d.content}<br>
    <span class="big-btn star" id="${likeId}">★</span>
    <span id="count_${doc.id}">${d.likes||0}</span>
  `;

  div.querySelector("#"+likeId).onclick=async()=>{
    const countEl=document.getElementById("count_"+doc.id);
    countEl.innerText=parseInt(countEl.innerText)+1;

    await updateDoc(doc.ref,{likes:increment(1)});
  };

  box.appendChild(div);
 });
});
</script>

</body>
</html>
